controller_manager:
  ros__parameters:
    update_rate: 50
    use_sim_time: true

    joint_state_broadcaster:
       type: "joint_state_broadcaster/JointStateBroadcaster"
    scout_drive_controller:  
       type: "diff_drive_controller/DiffDriveController"

scout_drive_controller:
  ros__parameters:
    left_wheel_names: ["front_left_wheel_joint", "rear_left_wheel_joint"]
    right_wheel_names: ["front_right_wheel_joint", "rear_right_wheel_joint"]
    wheel_separation: 0.58306
    wheel_radius: 0.16459
    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0
    publish_rate: 50.0
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    pose_covariance_diagonal: [0.05, 0.05, 1e3, 1e3, 1e3, 0.5]
    twist_covariance_diagonal: [0.05, 0.05, 1e3, 1e3, 1e3, 0.1]
    # pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    # twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    open_loop: false
    enable_odom_tf: true  # 필요 시 false
    tf_frame_prefix_enable: false
    use_stamped_vel: false
    preserve_turning_radius: true
    cmd_vel_timeout: 0.25
    publish_wheel_data: true
    linear:
      x:
        has_velocity_limits: true
        min_velocity: -1.0
        max_velocity: 1.0
        has_acceleration_limits: true
        min_acceleration: -2.5
        max_acceleration: 2.5
        has_jerk_limits: false
        max_jerk: 0.0
        min_jerk: 0.0
    angular:
      z:
        has_velocity_limits: true
        min_velocity: -1.0
        max_velocity: 1.0
        has_acceleration_limits: true
        min_acceleration: -2.5
        max_acceleration: 0.5
        has_jerk_limits: false
        max_jerk: 0.0
        min_jerk: 0.0
