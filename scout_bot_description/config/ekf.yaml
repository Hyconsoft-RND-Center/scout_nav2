### ekf config file ###
ekf_node:
  ros__parameters:
    # Debugging options # 저장하는 용량 주의
    # debug: true
    # debug_out_file: /home/scout/tmp/ekf.txt
    # 필터 출력 주파수 (Hz)
    frequency: 30.0 

    transform_time_offset: 0.1 # 0.03 
    transform_timeout: 0.02  # 0.2

    sensor_timeout: 0.3

    # 2D 모드 사용 여부 (플래너 환경에서 필요시 true)
    two_d_mode: true

    # 가속도 정보를 출력할지 여부
    publish_acceleration: false

    # /tf 토픽으로 변환을 방송할지 여부
    publish_tf: true # false #slam_toolbox 또는 , mapping 사용 시: false

    # 프레임 설정 (로봇에 맞게 변경)
    use_sim_time: true # t시뮬레이터 사용 시: true, 실 로봇 사용 시: false
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map
    # odom      #mapping, localization (slam_toolbox, lio-sam, pcl-localization-ros2 등) 사용 시: odom 

    odom0: /scout_drive_controller/odom
    odom0_config: [
     false, false, false,   # x, y
     false, false, false,    # yaw
     true,  true,  false,   # vx, vy
     false, false, true,    # vyaw
     false, false, false    # no linear acceleration
    ]
    odom0_differential: false

    odom1: /odometry/gps
    odom1_config: [
      true,  true,  false,   # x, y
      false, false, true,    # yaw
      false, false, false,   # vx, vy
      false, false, false,    # vyaw
      false, false, false    # no linear acceleration
    ]
    odom1_differential: false


    # PCL localization pose input
    pose0: /pcl_pose
    pose0_config: [
      true,  true,  false,    # x, y, (no z)
      false, false, true,  # no orientation correction
      false, false, false,    # vx, vy, (no vz)
      false, false, false,   # (no vroll), (no vpitch), vyaw
      false, false, false   # no linear acceleration
    ]
    pose0_differential: false

    # IMU input (optional)
    imu0: /ouster/imu
    imu0_config: [
      false, false, false,   # no position
      false, false, true,   # no orientation
      false, false, false,   # no linear velocity
      false, false, false,    # use yaw rate
      false, false, false    # no linear acceleration
    ]
    imu0_differential: false

navsat_transform:
  ros__parameters:
    frequency: 10.0
    two_d_mode: true
    broadcast_utm_transform: false
    broadcast_utm_transform_as_parent_frame: true
    gps_topic: /fix
    imu_topic: /ouster/imu
    odometry_topic: /scout_drive_controller/odom
    # IMU yaw가 불안하면: use_odometry_yaw: true
    # 재현성 위해 고정 datum 쓰려면(선택):
    # wait_for_datum: true
    # datum: [37.3969908, 127.1129974, 38.0]     # world의 기준점과 '같게'