# GNSS(NavSat) Bridge
- ros_topic_name: "/fix"
  gz_topic_name: "/gnss1"
  ros_type_name: "sensor_msgs/msg/NavSatFix"
  gz_type_name: "gz.msgs.NavSat"
  direction: "GZ_TO_ROS"
- ros_topic_name: "/fix2"
  gz_topic_name: "/gnss2"
  ros_type_name: "sensor_msgs/msg/NavSatFix"
  gz_type_name: "gz.msgs.NavSat"
  direction: "GZ_TO_ROS"
# Ultrasonic Bridge
- ros_topic_name: "/sensor/s1_data"
  gz_topic_name: "/ultrasonic_right"
  ros_type_name: "sensor_msgs/msg/Range"
  gz_type_name: "gz.msgs.LaserScan"
  direction: "GZ_TO_ROS"
- ros_topic_name: "/sensor/s2_data"
  gz_topic_name: "/ultrasonic_left"
  ros_type_name: "sensor_msgs/msg/Range"
  gz_type_name: "gz.msgs.LaserScan"
  direction: "GZ_TO_ROS"
- ros_topic_name: "/sensor/s3_data"
  gz_topic_name: "/ultrasonic_rear_left"
  ros_type_name: "sensor_msgs/msg/Range"
  gz_type_name: "gz.msgs.LaserScan"
  direction: "GZ_TO_ROS"
