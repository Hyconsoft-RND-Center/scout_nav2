local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_link
      footprint: "[[-0.6, -0.5], [-0.6, 0.4], [0.65, 0.5], [0.65, -0.4]]" # 로봇의 실제 크기를 반영
      #footprint: "[[-0.4, -0.3], [-0.4, 0.3], [0.4, 0.3], [0.4, -0.3]]" # 로봇의 실제 크기를 반영
      update_frequency: 10.0
      publish_frequency: 10.0
      width: 10
      height: 10
      resolution: 0.05
      rolling_window: true

      plugins: ["obstacle_layer", "inflation_layer"] #

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_subscribe_transient_local: True

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: pointcloud

        pointcloud:
          data_type: PointCloud2
          topic: /ouster/points
          marking: true
          clearing: true
          obstacle_range: 8.0             # 멀리 있는 장애물까지 marking
          raytrace_range: 10.0            # learing도 여유롭게 설정
          min_obstacle_height: 0.05       # 지면 반사 제거
          max_obstacle_height: 2.5        # 대부분의 구조물 포함
          min_z: 0.05                     # LiDAR에서 지면 반사 제외
          max_z: 5.0
          voxel_min_points: 1             # marking 최소 포인트 조건
          clear_after_reading: false      # marking 실패 방지
          expected_update_rate: 0.1

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 1.5 # 1.5            
        cost_scaling_factor: 1.5

      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        voxel_decay: 15.
        decay_model: 1
        voxel_size: 0.05
        track_unknown_space: true
        unknown_threshold: 5 # 15 # 하나의 voxel이 unknown으로 간주되기 위한 조건
        mark_threshold: 1 # 0
        update_footprint_enabled: true
        combination_method: 1
        origin_z: 0.0
        publish_voxel_map: true
        transform_tolerance: 1.0 # 0.2
        mapping_mode: false
        map_save_duration: 60.0
        observation_sources: pointcloud
        pointcloud:
          data_type: PointCloud2
          topic: /ouster/points
          marking: true
          clearing: true
          obstacle_range: 3.0
          min_obstacle_height: 0.05
          max_obstacle_height: 2.0
          expected_update_rate: 0.1
          observation_persistence: 0.0
          inf_is_valid: false
          filter: "voxel"
          voxel_min_points: 0
          clear_after_reading: true
          max_z: 7.0
          min_z: 0.1
          vertical_fov_angle: 0.8745
          horizontal_fov_angle: 1.048
          decay_acceleration: 15.0
          model_type: 0

