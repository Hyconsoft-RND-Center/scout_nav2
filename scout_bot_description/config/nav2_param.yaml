controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 10.0 # 20Hz 정도면 충분
    min_x_velocity_threshold: 0.01 # 너무 낮으면 정지판단 어려움
    min_y_velocity_threshold: 0.001 # diff_drive에서는 거의 의미 없음
    min_theta_velocity_threshold: 0.01
    failure_tolerance: 0.5
    transform_timeout: 1.0 # 0.5
    transform_tolerance: 0.5

    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # 전진 상태 체크
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3 # 너무 크면 정체 오탐 가능
      movement_time_allowance: 2.0 # 옥외 주행 시, 매우 높여 계속적인 주행 유도 가능
        # 10.0 # 해당 시간 동안 이동하지 못한 경우 fail 간주 후, recovery 진입 가능

    # 목표 도달 조건
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.3 # 2.0 → 너무 큼
      yaw_goal_tolerance: 0.5 # 5.0 rad → 약 286도 → 비정상 → 0.5 rad ≈ 28도

    # 로컬 컨트롤러 설정
    # Regulated Pure Pursuit
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 1.0 # 0.5
      lookahead_dist: 0.7
      min_lookahead_dist: 0.1
      max_lookahead_dist: 2.0
      lookahead_time: 1.0 # 1.0
      rotate_to_heading_angular_vel: 1.8 # 1.8
      transform_tolerance: 1.0   # 0.1
      use_velocity_scaled_lookahead_dist: false # false
      min_approach_linear_velocity: 0.0
      approach_velocity_scaling_dist: 0.6 # 0.6
      use_collision_detection: true # true
      max_allowed_time_to_collision_up_to_carrot: 2.0 # 1.5 충돌 예측 거리
      use_regulated_linear_velocity_scaling: true
      use_fixed_curvature_lookahead: false         #속도 기반 carrot 조정
      curvature_lookahead_dist: 0.25
      use_cost_regulated_linear_velocity_scaling: true # false # 장애물 회피 관련 속도 조절
      regulated_linear_scaling_min_radius: 0.2 # 1.0 # 회전 반경이 작아질 수록 선속도 감속
      regulated_linear_scaling_min_speed: 0.15 # 장애물을 감지한 경우 최대로 줄일 수 있는 속도
      use_rotate_to_heading: true
      allow_reversing: true # false
      rotate_to_heading_min_angle: 0.3 # 0.785 # 해당 값이 작으면 정지 회전 유도, 크면 anckermann 같은 회전 유도
      max_angular_accel: 3.2
      max_robot_pose_search_dist: 10.0
      debug_trajectory_details: False # 디버그용 아니면 False
      use_velocity_scaling: true
      use_regulated_lookahead_dist: true
      regulate_by_approach_angle: true
      inflation_cost_scaling_factor: 1.5
      cost_scaling_dist: 3.0  # 주행 cost가 바뀌는 거리 

    # DWB
    # FollowPath:
    #   plugin: "dwb_core::DWBLocalPlanner"
    #   debug_trajectory_details: True
    #   min_vel_x: 0.0
    #   min_vel_y: 0.0
    #   max_vel_x: 0.26
    #   max_vel_y: 0.0
    #   max_vel_theta: 1.0
    #   min_speed_xy: 0.0
    #   max_speed_xy: 0.26
    #   min_speed_theta: 0.0
    #   acc_lim_x: 2.5
    #   acc_lim_y: 0.0
    #   acc_lim_theta: 3.2
    #   decel_lim_x: -2.5
    #   decel_lim_y: 0.0
    #   decel_lim_theta: -3.2
    #   vx_samples: 20
    #   vy_samples: 5
    #   vtheta_samples: 20
    #   sim_time: 1.7
    #   linear_granularity: 0.05
    #   angular_granularity: 0.025
    #   transform_tolerance: 0.2
    #   xy_goal_tolerance: 0.25
    #   trans_stopped_velocity: 0.25
    #   short_circuit_trajectory_evaluation: True
    #   limit_vel_cmd_in_traj: False
    #   stateful: True
    #   critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
    #   BaseObstacle.scale: 0.02
    #   PathAlign.scale: 32.0
    #   GoalAlign.scale: 24.0
    #   PathAlign.forward_point_distance: 0.1
    #   GoalAlign.forward_point_distance: 0.1
    #   PathDist.scale: 32.0
    #   GoalDist.scale: 24.0
    #   RotateToGoal.scale: 32.0
