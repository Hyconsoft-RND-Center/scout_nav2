      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: map # map # odom
    robot_base_frame: base_link
    transform_tolerance: 1.0 # 0.2
    use_sim_time: true
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: True

waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [1.0, 0.0, 4.0]
    min_velocity: [-1.5, 0.0, -4.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "odom" # odom
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.05] # 일정 이하의 속도 cut [x, y, z]
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    use_sim_time: True
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"  # cmd_vel_raw # collision_monitor가 입력 받을 토픽, controller_server 또는 velocity smoother에서 발행
    cmd_vel_out_topic: "cmd_vel"     # collision_monitor가 최종적으로 발행할 토픽
    # cmd_vel_out_topic: "scout_drive_controller/cmd_vel_unstamped" # for ignition ros2_control

    transform_tolerance: 1.0  # 0.5   # 센서(예: PointCloud)가 수집된 시점과 현재 기준 프레임의 위치 차이를 보정할지 여부
    source_timeout: 5.0              # 아래 observation_source: 의 입력이 5초 동안 안 들어오면 해당 source를 timeout으로 간주
    base_shift_correction: True
    stop_pub_timeout: 2.0            # StopZone 해체 후, 속도:0을 유지할 시간(초)
    # Polygons represent zone around the robot for "stop" and "slowdown" action types,
    # and robot footprint for "approach" action type.
    # Footprint could be "polygon" type with dynamically set footprint from footprint_topic
    # or "circle" type with static footprint set by radius. "footprint_topic" parameter
    # to be ignored in circular case.
    polygons: ["PolygonStop", "FootprintApproach"] # "PolygonStop", "PolygonSlow", 
    PolygonStop:
      type: "polygon"
      points: [1.5, 1.5, 1.5, -1.5, -1.5, 1.5, -1.5, -1.5] # [x1, y1, x2, y2, ...]
      action_type: "stop"
      max_points: 4
      visualize: True
      polygon_pub_topic: "polygon_stop"
      scale_linear_speed: 3.0   
      scale_angular_speed: 1.0
      enabled: True
    PolygonSlow:
      type: "polygon"
      points: [2.5, 2.0, 2.5, -2.0, -2.5, -2.0, -2.5, 2.0] # [x1, y1, x2, y2, ...]
      action_type: "slowdown"
      max_points: 6
      slowdown_ratio: 0.7 # 0.3 # (입력 속도)*slowdown_ratio
      visualize: True
      polygon_pub_topic: "polygon_slowdown" # rviz2 상 시각화 될 토픽
      enabled: true
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
